<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GWU Room Reservations</title>
    <link rel="stylesheet" href="homepagestyle.css">
    <script src="homepage.js"></script>
</head>
<body>
    <header>
        <h1>GWSB Managed Duquès & Funger Hall Complex Space</h1>
    </header>
    <!--Login Screen will pop up first for GWU-->
    <section id="login-section">
        <h2>Login with your GWU Email</h2>
        <form id="loginForm">
            <label for="email">GWU Email: </label>
            <input type="email" id="email" name="email" placeholder="example@gwu.edu" required />
            <button type="submit">Login</button>
            <p id="login-error">Please enter a valid @gwu.edu email.</p>
        </form>
    </section>

    <!--Main Reservation System shown after proper login-->
    <section id="mainpage">
        <!--Reservation Form-->
        <h2>Reserve a Room</h2>
    </section>
</body>
</html>
